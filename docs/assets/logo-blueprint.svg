<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#ffffff" />
  <defs>
    <pattern
      id="smallGrid"
      width="20"
      height="20"
      patternUnits="userSpaceOnUse"
    >
      <path
        d="M 20 0 L 0 0 0 20"
        fill="none"
        stroke="#f1f5f9"
        stroke-width="1.2"
      />
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)" />
      <path
        d="M 100 0 L 0 0 0 100"
        fill="none"
        stroke="#e2e8f0"
        stroke-width="2"
      />
    </pattern>

    <!-- Markers -->
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#64748b" />
    </marker>
    <marker id="dot-blue" markerWidth="10" markerHeight="10" refX="5" refY="5">
      <circle cx="5" cy="5" r="4" fill="#3b82f6" />
    </marker>

    <!-- Gray Markers -->
    <marker
      id="arrow-start"
      markerWidth="10"
      markerHeight="10"
      refX="0"
      refY="5"
      orient="auto"
    >
      <path
        d="M 10 0 L 0 5 L 10 10"
        fill="none"
        stroke="#94a3b8"
        stroke-width="2"
      />
    </marker>
    <marker
      id="arrow-end"
      markerWidth="10"
      markerHeight="10"
      refX="10"
      font-family="monospace"
      refY="5"
      orient="auto"
    >
      <path
        d="M 0 0 L 10 5 L 0 10"
        fill="none"
        stroke="#94a3b8"
        stroke-width="2"
      />
    </marker>

    <!-- Black Markers for Footprint -->
    <marker
      id="arrow-start-black"
      markerWidth="10"
      markerHeight="10"
      refX="0"
      refY="5"
      orient="auto"
    >
      <path
        d="M 10 0 L 0 5 L 10 10"
        fill="none"
        stroke="#000000"
        stroke-width="2.5"
      />
    </marker>
    <marker
      id="arrow-end-black"
      markerWidth="10"
      markerHeight="10"
      refX="10"
      refY="5"
      orient="auto"
    >
      <path
        d="M 0 0 L 10 5 L 0 10"
        fill="none"
        stroke="#000000"
        stroke-width="2.5"
      />
    </marker>
  </defs>

  <rect width="1000" height="1000" fill="url(#grid)" />

  <g transform="translate(100, 100)">
    <!-- Boundary 800x800 -->
    <rect
      width="800"
      height="800"
      fill="none"
      stroke="#cbd5e1"
      stroke-width="1.5"
      stroke-dasharray="6 4"
    />

    <!-- PILLARS -->
    <rect width="200" height="600" x="0" y="0" rx="16" fill="#000000" />
    <rect width="200" height="600" x="300" y="200" rx="16" fill="#000000" />
    <rect width="200" height="600" x="600" y="0" rx="16" fill="#000000" />

    <!-- GUIDELINES & DIMENSIONS -->
    <g stroke="#94a3b8" stroke-width="2.5" fill="none">
      <path
        d="M 0,-40 L 200,-40"
        marker-start="url(#arrow-start)"
        marker-end="url(#arrow-end)"
      />
      <path
        d="M 500,-40 L 600,-40"
        marker-start="url(#arrow-start)"
        marker-end="url(#arrow-end)"
      />
      <path
        d="M -40,0 L -40,600"
        marker-start="url(#arrow-start)"
        marker-end="url(#arrow-end)"
      />
      <path
        d="M 260,0 L 260,200"
        marker-start="url(#arrow-start)"
        marker-end="url(#arrow-end)"
      />
    </g>

    <!-- TEXT ANNOTATIONS -->
    <g font-family="monospace" font-size="18" fill="#334155" font-weight="700">
      <text x="100" y="-60" text-anchor="middle">W: 200px</text>
      <text x="550" y="-60" text-anchor="middle">1/2 W = 100px</text>
      <text
        x="-65"
        y="300"
        text-anchor="middle"
        transform="rotate(-90, -65, 300)"
      >H: 600px</text>
      <text
        x="235"
        y="100"
        text-anchor="middle"
        transform="rotate(-90, 235, 100)"
      >1/3 H = 200px</text>
    </g>

    <!-- FOOTPRINT INDICATORS -->
    <g stroke="#000000" stroke-width="3">
      <path
        d="M 0,840 L 800,840"
        marker-start="url(#arrow-start-black)"
        marker-end="url(#arrow-end-black)"
      />
      <path
        d="M 840,0 L 840,800"
        marker-start="url(#arrow-start-black)"
        marker-end="url(#arrow-end-black)"
      />
    </g>
    <g font-family="monospace" font-size="20" fill="#000000" font-weight="800">
      <text x="400" y="875" text-anchor="middle">TOTAL WIDTH: 800px</text>
      <text
        x="875"
        y="400"
        text-anchor="middle"
        transform="rotate(90, 875, 400)"
      >TOTAL HEIGHT: 800px</text>
    </g>

    <!-- 45 DEGREE V-CONSTRUCTION -->
    <g>
      <!-- Central Axis -->
      <line
        x1="400"
        y1="200"
        x2="400"
        y2="800"
        stroke="#94a3b8"
        stroke-width="2.5"
        stroke-dasharray="8 4"
      />
      <!-- Left V-Branch -->
      <path
        d="M 100,0 L 100,500 L 400,800"
        stroke="#3b82f6"
        stroke-width="3"
        stroke-dasharray="8 4"
        fill="none"
        marker-start="url(#dot-blue)"
        marker-end="url(#dot-blue)"
      />
      <!-- Right V-Branch -->
      <path
        d="M 700,0 L 700,500 L 400,800"
        stroke="#3b82f6"
        stroke-width="3"
        stroke-dasharray="8 4"
        fill="none"
        marker-start="url(#dot-blue)"
      />

      <!-- Angle Text -->
      <text
        x="372"
        y="735"
        text-anchor="middle"
        font-family="monospace"
        font-size="18"
        fill="#ffffff"
        font-weight="800"
      >45°</text>
    </g>

    <!-- Radius Annotation -->
    <g>
      <circle
        cx="792"
        cy="8"
        r="28"
        fill="none"
        stroke="#ef4444"
        stroke-width="3"
      />
      <text
        x="792"
        y="-30"
        text-anchor="middle"
        font-family="monospace"
        font-size="18"
        fill="#dc2626"
        font-weight="800"
      >R: 16px</text>
    </g>
  </g>
</svg>
